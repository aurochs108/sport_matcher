name: unit_tests

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  test:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-flutter

      - name: Run tests
        run: flutter test
